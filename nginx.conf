events {
    worker_connections 1024;
}

http {
    # Rate limiting zone definition: 10 requests per second burstable
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # Standard reverse proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Dashboard UI Root Route
        location / {
            proxy_pass http://serving-engine:8000/;
        }

        # 2. SSE Streaming API Endpoint (requires buffering disabled!)
        location /generate {
            # Apply rate limiting
            limit_req zone=api_limit_zone burst=5 nodelay;

            proxy_pass http://serving-engine:8000/generate;

            # CRITICAL PRODUCTION SETTINGS FOR LLM STREAMING:
            # Disable Nginx proxy buffering to stream tokens character-by-character immediately.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            
            # Streaming headers
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # 3. WebSocket Real-time Telemetry Route
        location /api/telemetry {
            proxy_pass http://serving-engine:8000/api/telemetry;

            # Enable Websocket upgrade headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 4. Prometheus Metrics endpoint
        location /metrics {
            proxy_pass http://serving-engine:8000/metrics;
        }
    }
}
