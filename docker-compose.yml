version: '3.8'

services:
  serving-engine:
    build: .
    container_name: vllm-serving-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  nginx-gateway:
    image: nginx:alpine
    container_name: vllm-nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - serving-engine
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: vllm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - serving-engine
    restart: unless-stopped

volumes:
  hf_cache:
